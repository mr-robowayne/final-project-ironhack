limit_req_zone $binary_remote_addr zone=authlimit:10m rate=20r/m;

upstream dhpatientsync_app {
  server app:5000;
  keepalive 32;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name dhpatient-sync.app _;
  # LAN-only inbound (no public Internet exposure)
  include /etc/nginx/conf.d/allowlist.conf;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name dhpatient-sync.app _;

  # LAN-only inbound (no public Internet exposure)
  include /etc/nginx/conf.d/allowlist.conf;

  ssl_certificate     /etc/nginx/ssl/dhpatient-sync.app.crt;
  ssl_certificate_key /etc/nginx/ssl/dhpatient-sync.app.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;
  server_tokens off;

  client_max_body_size 20m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-src 'self' blob:; object-src 'self' blob:;" always;

  # Never expose internal-only endpoints via the reverse proxy.
  location ^~ /internal/ {
    return 404;
  }

  # Light rate limit on login to slow brute-force attacks.
  location = /api/login {
    limit_req zone=authlimit burst=10 nodelay;
    proxy_pass http://dhpatientsync_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300;
  }

  location = /health {
    proxy_pass http://dhpatientsync_app/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60;
  }

  location / {
    proxy_pass http://dhpatientsync_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300;
  }
}
