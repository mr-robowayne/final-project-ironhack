# LAN-only allowlist (edit for clinic network)
# Default: RFC1918 + localhost
allow 10.0.0.0/8;
allow 172.16.0.0/12;
allow 192.168.0.0/16;
allow 127.0.0.1;
allow ::1;

# NOTE (Docker Desktop / macOS with VPN/Private Relay):
# Some setups make connections appear with a non-RFC1918 source IP at nginx (e.g. Cloudflare/WARP).
# If you see repeated 403 with a stable `client: <ip>` in `docker compose logs proxy`,
# whitelist that exact IP here to restore local/LAN testing without opening public inbound.
allow 172.66.0.243;
deny all;
