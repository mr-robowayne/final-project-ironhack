---
# =============================================================================
# Role: docker-install
# Installiert Docker Engine + Docker Compose Plugin auf Ubuntu 22.04
# =============================================================================

- name: Auf apt-Lock warten (unattended-upgrades beim EC2-Start)
  ansible.builtin.shell: |
    systemctl stop unattended-upgrades || true
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 3
    done
  changed_when: false

- name: apt auf IPv4 + HTTPS umstellen (SG erlaubt nur 443 outbound, kein IPv6 Egress)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99patientsync
    content: |
      Acquire::ForceIPv4 "true";
    mode: "0644"

- name: apt sources auf HTTPS umstellen
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: 'http://'
    replace: 'https://'

- name: System-Pakete aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Abhängigkeiten installieren
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
      - awscli
    state: present

- name: Docker GPG-Key hinzufügen
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Docker APT Repository hinzufügen
  ansible.builtin.shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "${VERSION_CODENAME}") stable" | \
      tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Docker installieren
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Docker-Service starten und aktivieren
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: ubuntu-User zur docker-Gruppe hinzufügen
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Python Docker-Bibliothek für Ansible installieren
  ansible.builtin.pip:
    name:
      - docker
      - docker-compose
    state: present

- name: Verzeichnisstruktur erstellen
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0750"
  loop:
    - "{{ app_dir }}"
    - "{{ env_dir }}"
    - "{{ data_dir }}"
    - "{{ log_dir }}"
    - "{{ data_dir }}/tenants"

- name: /etc/patientsync Berechtigungen sichern (nur root lesbar)
  ansible.builtin.file:
    path: "{{ env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
