---
# =============================================================================
# Role: patientsync-deploy
# Pulled Docker Images + docker-compose starten.
# Läuft auf beiden EC2s gleichzeitig (Ansible parallele Execution).
# =============================================================================

# ── Verzeichnisse sicherstellen ───────────────────────────────────────────────

- name: Verzeichnisse anlegen
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ env_dir }}"
    - "{{ app_dir }}"
    - "{{ data_dir }}"
    - "{{ log_dir }}"

# ── Env-Dateien deployen ──────────────────────────────────────────────────────

- name: backend-api.env deployen
  ansible.builtin.template:
    src: backend-api.env.j2
    dest: "{{ env_dir }}/backend-api.env"
    owner: root
    group: root
    mode: "0600"

- name: billing-api.env deployen
  ansible.builtin.template:
    src: billing-api.env.j2
    dest: "{{ env_dir }}/billing-api.env"
    owner: root
    group: root
    mode: "0600"

- name: ai-service.env deployen
  ansible.builtin.template:
    src: ai-service.env.j2
    dest: "{{ env_dir }}/ai-service.env"
    owner: root
    group: root
    mode: "0600"

- name: login-gateway.env deployen
  ansible.builtin.template:
    src: login-gateway.env.j2
    dest: "{{ env_dir }}/login-gateway.env"
    owner: root
    group: root
    mode: "0600"

# ── docker-compose.yml deployen ───────────────────────────────────────────────

- name: docker-compose.yml deployen
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: "0640"

# ── ECR Login (via IAM Role — kein Passwort nötig) ───────────────────────────

- name: ECR Login
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }} | \
    docker login --username AWS --password-stdin {{ ecr_registry }}
  changed_when: true

# ── Images pullen ─────────────────────────────────────────────────────────────

- name: Alle Images pullen (linux/amd64)
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
    force_source: true
  loop:
    - "{{ images.backend_api }}"
    - "{{ images.billing_api }}"
    - "{{ images.ai_service }}"
    - "{{ images.login_gateway }}"

# ── Alte Container sauber entfernen (verhindert Name-Conflicts) ─────────────

- name: Alle Container stoppen (docker compose down)
  ansible.builtin.shell: |
    cd "{{ app_dir }}"
    docker compose down --remove-orphans --timeout 30 2>&1 || true
  changed_when: true

- name: Verwaiste Container zwangs-entfernen
  ansible.builtin.shell: |
    # Alle Container mit patientsync im Namen entfernen (egal welcher State)
    docker ps -a --filter "name=patientsync" --format "{% raw %}{{.ID}}{% endraw %}" | xargs -r docker rm -f 2>&1 || true
    # Auch Container mit Hash-Prefix entfernen (z.B. 6e1228710c93_patientsync-*)
    docker ps -a --format "{% raw %}{{.ID}} {{.Names}}{% endraw %}" | grep -i patientsync | awk '{print $1}' | xargs -r docker rm -f 2>&1 || true
    # Verify: keine patientsync Container mehr vorhanden
    REMAINING=$(docker ps -a --format "{% raw %}{{.Names}}{% endraw %}" | grep -c patientsync || true)
    echo "Remaining patientsync containers: $REMAINING"
    [ "$REMAINING" -eq 0 ] || { echo "WARN: $REMAINING containers still exist"; docker ps -a --format "{% raw %}{{.Names}} {{.Status}}{% endraw %}" | grep patientsync; }
  changed_when: true

# ── Container starten ───────────────────────────────────────────────────────

- name: docker compose up (alle Services)
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    pull: always
    remove_orphans: true
  register: compose_result

- name: Gestartete Container anzeigen
  ansible.builtin.debug:
    msg: "{{ compose_result.containers | map(attribute='Name') | list }}"
  when: compose_result.containers is defined

# ── Container Status + Logs (Diagnose) ───────────────────────────────────────

- name: Container Status prüfen (docker ps -a)
  ansible.builtin.shell: docker ps -a --format "table {% raw %}{{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
  register: docker_ps_result
  changed_when: false

- name: Container Status anzeigen
  ansible.builtin.debug:
    msg: "{{ docker_ps_result.stdout_lines }}"

- name: Warten bis port {{ ports.backend_api }} offen ist (TCP)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ports.backend_api }}"
    timeout: 90
    delay: 5
  ignore_errors: true

- name: backend-api Logs (letzte 120 Zeilen nach wait)
  ansible.builtin.shell: docker logs patientsync-backend-api --tail 120 2>&1 || true
  register: backend_logs
  changed_when: false

- name: backend-api Logs anzeigen (nach wait_for)
  ansible.builtin.debug:
    msg: "{{ backend_logs.stdout_lines }}"

- name: backend-api Health direkt testen (Debug)
  ansible.builtin.shell: >
    curl -sv -H 'x-forwarded-proto: https'
    http://127.0.0.1:{{ ports.backend_api }}/api/health 2>&1 || true
  register: curl_health
  changed_when: false

- name: backend-api Health Ergebnis anzeigen
  ansible.builtin.debug:
    msg: "{{ curl_health.stdout_lines }}"

# ── Healthchecks ──────────────────────────────────────────────────────────────

- name: Warten bis backend-api antwortet
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ports.backend_api }}/api/health"
    headers:
      x-forwarded-proto: "https"
    status_code: 200
    timeout: 10
  register: health_check
  retries: 18
  delay: 5
  until: health_check.status == 200

- name: Warten bis login-gateway antwortet
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ports.login_gateway }}/health"
    status_code: [200, 404]
    timeout: 5
  register: gw_health
  retries: 6
  delay: 5
  until: gw_health.status in [200, 404]
