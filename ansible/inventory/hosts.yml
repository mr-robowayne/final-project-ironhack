---
# Statisches Fallback-Inventory (wenn AWS Dynamic Inventory nicht verfügbar)
# Für die echten IP-Adressen: terraform output -state=terraform/deploy-backend/terraform.tfstate
#
# Produktiv: aws_ec2.yml (Dynamic Inventory) bevorzugen.

all:
  children:
    patientsync_backend:
      hosts:
        patientsync-ec2-a:
          ansible_host: 10.50.11.x   # private IP EC2-A (AZ eu-central-2a) — anpassen!
          ansible_user: ubuntu
        patientsync-ec2-b:
          ansible_host: 10.50.12.x   # private IP EC2-B (AZ eu-central-2b) — anpassen!
          ansible_user: ubuntu
