[defaults]
inventory          = ./inventory/aws_ec2.yml
roles_path         = ./roles
collections_paths  = ~/.ansible/collections
remote_user        = ubuntu
host_key_checking  = False
stdout_callback    = ansible.builtin.default
result_format      = yaml
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts_patientsync
fact_caching_timeout    = 3600
retry_files_enabled     = False

[ssh_connection]
pipelining = True
# AWS SSM Session Manager als SSH-Proxy (EC2 in privaten Subnetzen, kein Public IP)
# Voraussetzungen:
#   brew install session-manager-plugin  (macOS)
#   aws configure --profile patientsync  (AWS Credentials)
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p --region eu-central-2'

[privilege_escalation]
become        = True
become_method = sudo
