[defaults]
inventory          = ./inventory/aws_ec2.yml
roles_path         = ./roles
collections_paths  = ~/.ansible/collections
host_key_checking  = False
stdout_callback    = ansible.builtin.default
result_format      = yaml
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts_patientsync
fact_caching_timeout    = 3600
retry_files_enabled     = False

# SSH-Verbindung nur für lokale Entwicklung (ansible.cfg wird beim SSM-Betrieb ignoriert)
# Im CI/CD wird community.aws.aws_ssm Connection Plugin verwendet (kein SSH-Key nötig)
[ssh_connection]
# Lokale SSH-Verbindung via SSM (nur für manuelle Runs mit --connection=ssh)
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand='aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p --region eu-central-2'

[privilege_escalation]
become        = True
become_method = sudo
